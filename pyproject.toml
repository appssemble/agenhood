[tool.ruff]
target-version = "py312"
line-length = 100
src = ["packages/agentcore", "services/shim", "services/control_plane", "services/connectors"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "ASYNC"]
ignore = [
    "B008",     # FastAPI Depends() in defaults is idiomatic (used in later units)
    "ASYNC230", # file tools use sync I/O in async fns intentionally (no trio/anyio)
    "ASYNC240", # file tools use os.path in async fns intentionally (no trio/anyio)
]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
plugins = ["pydantic.mypy"]
mypy_path = "packages/agentcore:services/shim:services/control_plane:services/connectors"
explicit_package_bases = true

[[tool.mypy.overrides]]
module = ["testcontainers.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["docker.*", "asyncpg.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages/agentcore/tests", "services/shim/tests", "services/control_plane/tests", "services/connectors/tests"]
markers = [
    "unit: fast tests with no external dependencies (default; run anywhere)",
    "integration: requires a running docker daemon",
]
addopts = "-ra"
