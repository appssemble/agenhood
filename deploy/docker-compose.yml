# Local dev topology, first cut: just the control plane + its database.
# Egress proxy / searxng / traefik / web console land in later units — this is
# enough to run `alembic upgrade head` against a real Postgres and boot the API.
name: agent-runtime

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agenhood
      POSTGRES_PASSWORD: agenhood
      POSTGRES_DB: agenhood
    volumes:
      - "pgdata:/var/lib/postgresql/data"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenhood -d agenhood"]
      interval: 10s
      timeout: 5s
      retries: 5

  control-plane:
    build:
      context: ..
      dockerfile: services/control_plane/Dockerfile
    command: ["uvicorn", "control_plane.asgi:app", "--host", "0.0.0.0", "--port", "8443", "--reload"]
    restart: unless-stopped
    ports:
      - "8443:8443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"   # provisions agent containers
      - "../services/control_plane:/app/services/control_plane"
    environment:
      DATABASE_URL: postgresql+asyncpg://agenhood:agenhood@postgres:5432/agenhood
      SEED_API_KEY: ${SEED_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
