[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentcore"
version = "0.1.0"
description = "Shared models, interfaces, and contracts for the agent runtime."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.6,<3",
    "httpx>=0.27",
    "trafilatura>=1.9",
    "jsonschema>=4.26.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.12",
    "ruff>=0.4",
    "mypy>=1.10",
    "respx>=0.21",
    "types-jsonschema>=4.26",
    "pytest-cov>=5",
    "fastapi>=0.110",
]

[tool.hatch.build.targets.wheel]
packages = ["agentcore"]
