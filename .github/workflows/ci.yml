name: CI

# Auto-runs are paused (manual-only). Re-enable by restoring the push/
# pull_request triggers below; run on demand via Actions → Run workflow.
on:
  workflow_dispatch:
  # push:
  #   branches: ["**"]
  # pull_request:

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install agentcore (editable, with dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/agentcore[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy packages/agentcore/agentcore
      - name: Unit tests
        run: pytest -m unit -q

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install agentcore (editable, with dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/agentcore[dev]"
      - name: Validate test compose file
        run: docker compose -f deploy/docker-compose.test.yml config -q
      - name: Bring up the test stack
        run: docker compose -f deploy/docker-compose.test.yml up -d --wait
      - name: Integration tests (require a real docker daemon)
        env:
          REQUIRE_DOCKER: "1"
        run: pytest -m integration -q
      - name: Tear down the test stack
        if: always()
        run: docker compose -f deploy/docker-compose.test.yml down -v

  web-console:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
